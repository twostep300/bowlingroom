<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HeyReply Visual CMS</title>
  <style>
    :root { color-scheme: dark; --bg:#0e0f12; --panel:#181b22; --line:#2a2f3a; --text:#e5e7eb; --muted:#9ca3af; --accent:#ec4f04; }
    * { box-sizing: border-box; }
    html, body { width:100%; height:100%; overflow:hidden; }
    body { margin:0; font-family: Inter, system-ui, sans-serif; background:var(--bg); color:var(--text); }
    .layout { display:grid; grid-template-columns: minmax(380px, 420px) minmax(0, 1fr); width:100vw; height:100vh; overflow:hidden; }
    .sidebar { border-right:1px solid var(--line); padding:14px; display:grid; grid-template-rows:auto auto minmax(0,1fr) auto auto; gap:10px; overflow:auto; overflow-x:hidden; min-width:0; }
    .panel { border:1px solid var(--line); background:var(--panel); border-radius:10px; padding:10px; min-width:0; }
    .row { display:flex; gap:8px; align-items:center; }
    .row > * { min-width:0; }
    .grow { flex:1; }
    select,input,textarea,button { width:100%; max-width:100%; border:1px solid var(--line); background:#0d1016; color:var(--text); border-radius:8px; padding:8px; font:inherit; }
    textarea { min-height:90px; resize:vertical; white-space:pre-wrap; overflow-wrap:anywhere; }
    button { cursor:pointer; }
    button.primary { background:var(--accent); border-color:var(--accent); color:white; }
    .tabs button.active { border-color:var(--accent); color:#fff; }
    .section-card { border:1px solid var(--line); border-radius:10px; padding:8px; display:grid; gap:8px; }
    .hint { color:var(--muted); font-size:12px; }
    .preview-pane { min-width:0; width:100%; height:100%; overflow:hidden; background:#000; }
    .preview { display:block; width:100%; height:100%; border:0; background:#000; }
    .status { font-size:12px; color:var(--muted); }
    .field-title { font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:6px; }
    .json-wrap { display:none; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="panel row">
        <select id="pageSelect" class="grow"></select>
        <a id="openPage" href="/" target="_blank" style="color:var(--muted);font-size:12px;text-decoration:none">Seite öffnen</a>
      </div>
      <div class="panel tabs row">
        <button id="tabStructured" class="active">Structured</button>
        <button id="tabJson">JSON</button>
      </div>
      <div id="structuredRoot" class="panel"></div>
      <div id="jsonRoot" class="panel json-wrap">
        <textarea id="jsonEditor" style="min-height:60vh;font-family:ui-monospace,Menlo,monospace;font-size:12px"></textarea>
      </div>
      <div class="panel row">
        <button id="reload">Neu laden</button>
        <button id="save" class="primary">Speichern</button>
      </div>
      <div id="status" class="status">Bereit</div>
    </aside>
    <div class="preview-pane">
      <iframe id="previewFrame" class="preview" src="/heyreply?cmsPreview=1"></iframe>
    </div>
  </div>
  <script src="/admin/admin.js"></script>
</body>
</html>
