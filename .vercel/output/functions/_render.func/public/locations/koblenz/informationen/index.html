<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Informationen | Bowlingroom Koblenz</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@800,900&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Satoshi', sans-serif; background: #0a0a0a; color: #fff; margin: 0; }
    .font-display { font-family: 'Cabinet Grotesk', sans-serif; }
    .readable-heading { letter-spacing: 0.02em !important; }
  </style>
</head>
<body>
  <div class="min-h-screen bg-[#0A0A0A] selection:bg-[#FF3E00] selection:text-white">
    <nav class="fixed top-0 left-0 right-0 z-50 bg-[#0A0A0A]/90 backdrop-blur-md border-b border-white/10">
      <div class="max-w-[1440px] mx-auto px-6 h-20 flex items-center justify-between">
        <a href="/locations/koblenz" class="flex items-center">
          <img id="logo-image" alt="Bowlingroom" class="h-[45px] w-auto" />
        </a>
        <div class="hidden md:flex items-center gap-6">
          <div class="flex items-center space-x-12" id="nav-links"></div>
          <span id="nav-open-status" class="inline-flex items-center gap-2 bg-white/5 border border-white/10 px-3 py-2 rounded-full text-[11px] font-bold uppercase tracking-[0.12em]"></span>
        </div>
        <a id="nav-cta" href="#" class="bg-[#FF3E00] text-white px-6 py-2 font-display font-bold uppercase tracking-tighter hover:bg-white hover:text-black transition-all">Jetzt Buchen</a>
      </div>
    </nav>

    <main class="pt-28 pb-24">
      <section class="max-w-[1440px] mx-auto px-6 mb-14">
        <div class="flex items-center gap-3 text-[#FF3E00] mb-5 text-xs font-bold uppercase tracking-[0.3em]">
          <iconify-icon icon="lucide:info"></iconify-icon>
          <span>Informationen</span>
        </div>
        <h1 class="readable-heading font-display text-6xl md:text-8xl font-black uppercase leading-[0.9]">Preise, Zeiten & Kontakt</h1>
      </section>

      <section class="max-w-[1440px] mx-auto px-6 mb-14">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
          <div id="price-list" class="bg-zinc-100 p-12 text-black"></div>
          <div class="bg-zinc-100 p-12 text-black">
            <h3 class="font-display text-3xl font-black uppercase mb-8 flex items-center gap-4"><iconify-icon icon="lucide:clock" class="text-[#FF3E00]"></iconify-icon>Öffnungszeiten</h3>
            <div id="opening-hours" class="space-y-6"></div>
          </div>
        </div>
      </section>

      <section class="max-w-[1440px] mx-auto px-6">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
          <div class="lg:col-span-7 h-[520px] bg-zinc-900 overflow-hidden relative group">
            <img id="location-map-image" class="w-full h-full object-cover opacity-70 transition-transform duration-700 group-hover:scale-110" alt="Map" />
            <div class="absolute inset-0 flex items-center justify-center">
              <a id="map-link" href="#" class="border-2 border-[#FF3E00] text-[#FF3E00] px-8 py-4 font-display font-bold uppercase tracking-tighter hover:bg-[#FF3E00] hover:text-white transition-all">In Google Maps öffnen</a>
            </div>
          </div>
          <div class="lg:col-span-5 flex flex-col justify-center">
            <h2 class="font-display text-5xl font-black uppercase leading-tight tracking-tighter mb-10">Kontakt</h2>
            <div class="space-y-10">
              <div class="flex items-start space-x-5"><iconify-icon icon="lucide:map-pin" class="text-4xl text-[#FF3E00]"></iconify-icon><div><h4 class="text-xs font-bold uppercase tracking-[0.2em] text-zinc-500 mb-2">Adresse</h4><p id="location-address" class="text-2xl font-bold"></p></div></div>
              <div class="flex items-start space-x-5"><iconify-icon icon="lucide:phone" class="text-4xl text-[#FF3E00]"></iconify-icon><div><h4 class="text-xs font-bold uppercase tracking-[0.2em] text-zinc-500 mb-2">Telefon</h4><p id="location-phone" class="text-2xl font-bold"></p></div></div>
              <div class="flex items-start space-x-5"><iconify-icon icon="lucide:globe" class="text-4xl text-[#FF3E00]"></iconify-icon><div><h4 class="text-xs font-bold uppercase tracking-[0.2em] text-zinc-500 mb-2">Webseite</h4><a id="location-website" class="text-xl font-bold hover:text-[#FF3E00] transition-colors" target="_blank" rel="noreferrer"></a></div></div>
              <div class="flex items-start space-x-5"><iconify-icon icon="lucide:info" class="text-4xl text-[#FF3E00]"></iconify-icon><div><h4 class="text-xs font-bold uppercase tracking-[0.2em] text-zinc-500 mb-2">Anfahrt</h4><p id="location-info" class="text-zinc-400"></p></div></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="bg-black border-t border-white/5 py-16">
      <div class="max-w-[1440px] mx-auto px-6">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-10 mb-12">
          <div><a id="footer-logo" href="/locations/koblenz" class="font-display text-3xl font-black tracking-tighter uppercase block mb-5"></a><p id="footer-text" class="text-zinc-500 text-sm leading-relaxed"></p></div>
          <div><h4 class="text-xs font-bold uppercase tracking-[0.3em] mb-6 text-[#FF3E00]">Locations</h4><ul id="footer-locations" class="space-y-3 text-sm font-medium"></ul></div>
          <div><h4 class="text-xs font-bold uppercase tracking-[0.3em] mb-6 text-[#FF3E00]">Support</h4><ul id="footer-support" class="space-y-3 text-sm font-medium"></ul></div>
          <div><a href="/admin" class="inline-block bg-[#FF3E00] text-white px-4 py-3 font-display font-bold uppercase tracking-tighter hover:bg-white hover:text-black transition-all">Admin öffnen</a></div>
        </div>
        <div class="pt-6 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-5 text-[10px] font-bold uppercase tracking-[0.2em] text-zinc-600">
          <p id="copyright-text"></p>
          <div class="flex space-x-8">
            <a id="footer-imprint-link" class="hover:text-white transition-colors">Impressum</a>
            <a id="footer-privacy-link" class="hover:text-white transition-colors">Datenschutz</a>
            <a id="footer-agb-link" class="hover:text-white transition-colors">AGB</a>
          </div>
        </div>
      </div>
    </footer>
  </div>

  <script src="/locations/koblenz/informationen/page.js"></script>
</body>
</html>
