<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual CMS Builder</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0e0f12;
      --panel: #15171c;
      --line: #2a2e37;
      --text: #f3f4f6;
      --muted: #9ca3af;
      --brand: #ff3e00;
      --soft: #1d212a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background: var(--bg);
      color: var(--text);
    }
    header {
      height: 64px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(14, 15, 18, 0.95);
      backdrop-filter: blur(8px);
      gap: 10px;
      flex-wrap: wrap;
    }
    .left, .right { display: flex; align-items: center; gap: 10px; }
    .title { font-size: 15px; font-weight: 700; }
    main {
      height: calc(100vh - 64px);
      display: grid;
      grid-template-columns: minmax(390px, 480px) 1fr;
    }
    .sidebar {
      border-right: 1px solid var(--line);
      overflow: auto;
      background: var(--panel);
      padding: 14px;
    }
    .preview {
      background: #0b0c0f;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #000;
    }
    select, input, textarea, button, a {
      background: #1e222b;
      color: var(--text);
      border: 1px solid #3a3f4b;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      text-decoration: none;
    }
    textarea { width: 100%; min-height: 320px; resize: vertical; }
    button { cursor: pointer; }
    button.primary {
      background: var(--brand);
      border-color: var(--brand);
      font-weight: 700;
    }
    button.primary.saving {
      opacity: 0.8;
      cursor: wait;
      filter: saturate(0.85);
    }
    button.primary.saved {
      background: #16a34a;
      border-color: #16a34a;
      color: #fff;
    }
    .hint { color: var(--muted); font-size: 12px; }
    .field {
      border: 1px solid #2d3240;
      border-radius: 10px;
      margin-bottom: 10px;
      padding: 10px;
      background: #1a1d25;
    }
    .field-title {
      font-size: 12px;
      color: #d1d5db;
      margin-bottom: 8px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .field-grid {
      display: grid;
      gap: 8px;
    }
    .field-grid.two {
      grid-template-columns: 1fr 1fr;
    }
    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .tab-btn {
      background: var(--soft);
      border: 1px solid #3a3f4b;
      color: #cfd4db;
    }
    .tab-btn.active {
      border-color: var(--brand);
      color: var(--brand);
      background: rgba(255, 62, 0, 0.08);
    }
    .drag-list {
      display: grid;
      gap: 8px;
    }
    .drag-item {
      border: 1px solid #394152;
      background: #181c24;
      border-radius: 8px;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: move;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
    }
    .drag-item.dragging {
      opacity: 0.55;
      border-color: var(--brand);
    }
    .drag-item.active {
      border-color: var(--brand);
      color: var(--brand);
      background: rgba(255, 62, 0, 0.08);
    }
    .slide-card {
      border: 1px solid #3c4457;
      background: #181c24;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 10px;
    }
    .slide-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .pill {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid #343a48;
      color: #cbd5e1;
    }
    #status { color: var(--muted); font-size: 12px; margin-bottom: 10px; }
  </style>
</head>
<body>
  <header>
    <div class="left">
      <div class="title">Visual CMS Builder</div>
      <span class="pill">OnePage-like</span>
      <label for="pageSelect" class="hint">Seite</label>
      <select id="pageSelect"></select>
    </div>
    <div class="right">
      <a id="openPage" target="_blank">Seite öffnen</a>
      <button id="reload">Neu laden</button>
      <button class="primary" id="save">Speichern</button>
    </div>
  </header>
  <main id="layoutMain">
    <aside class="sidebar">
      <div class="tabs">
        <button id="tabStructured" class="tab-btn active" type="button">Structured Editor</button>
        <button id="tabJson" class="tab-btn" type="button">JSON Editor</button>
      </div>
      <div id="status"></div>
      <div id="structuredRoot"></div>
      <div id="jsonRoot" style="display:none">
        <div class="hint" style="margin-bottom:8px">Direkter Fallback-Editor</div>
        <textarea id="jsonEditor" spellcheck="false"></textarea>
      </div>
    </aside>
    <section class="preview" id="previewPane">
      <div class="hint">Live Preview</div>
      <iframe id="previewFrame" title="Website Preview"></iframe>
    </section>
  </main>
  <script src="/admin/admin.js"></script>
</body>
</html>
