<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bowlingroom Koblenz | Never Stop Playing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@800,900&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon-red: #ff3e00;
      --dark-bg: #0a0a0a;
    }
    body {
      font-family: 'Satoshi', sans-serif;
      background-color: var(--dark-bg);
      color: white;
      margin: 0;
    }
    .font-display {
      font-family: 'Cabinet Grotesk', sans-serif;
    }
    .skew-hover {
      transition: transform 0.3s ease-out;
    }
    .skew-hover:hover {
      transform: skew(-2deg) scale(1.01);
    }
  </style>
</head>
<body data-page="hagen">
  <div class="min-h-screen bg-[#0A0A0A] selection:bg-[#FF3E00] selection:text-white font-sans">
    <nav class="fixed top-0 left-0 right-0 z-50 bg-[#0A0A0A]/90 backdrop-blur-md border-b border-white/10">
      <div class="max-w-[1440px] mx-auto px-6 h-20 flex items-center justify-between">
        <a href="#" class="flex items-center">
          <img id="logo-image" alt="Bowlingroom" class="h-[45px] w-auto" />
        </a>
        <div class="hidden md:flex items-center space-x-12" id="nav-links"></div>
        <a id="nav-cta" href="#" class="bg-[#FF3E00] text-white px-6 py-2 font-display font-bold uppercase tracking-tighter hover:bg-white hover:text-black transition-all transform hover:-translate-y-0.5"></a>
      </div>
    </nav>

    <main>
      <section class="relative h-[80vh] w-full flex items-end overflow-hidden">
        <div class="absolute inset-0 z-0">
          <img id="hero-image" alt="Hero" class="w-full h-full object-cover brightness-50" />
          <div class="absolute inset-0 bg-gradient-to-t from-[#0A0A0A] via-[#0A0A0A]/20 to-transparent"></div>
        </div>
        <div class="relative z-10 max-w-[1440px] mx-auto px-6 pb-20 w-full">
          <div id="breadcrumbs" class="flex items-center space-x-2 text-[#FF3E00] mb-4 font-bold tracking-widest text-xs uppercase"></div>
          <h1 id="hero-title" class="font-display text-7xl md:text-[10rem] font-black uppercase leading-[0.85] tracking-tighter"></h1>
          <div class="mt-8 flex flex-col md:flex-row md:items-center gap-6">
            <p id="hero-subtitle" class="text-xl max-w-xl text-zinc-400 font-medium"></p>
            <div id="hero-badges" class="flex gap-4"></div>
          </div>
        </div>
      </section>

      <section class="py-32 bg-[#0A0A0A]">
        <div class="max-w-[1440px] mx-auto px-6">
          <div class="grid grid-cols-1 lg:grid-cols-12 gap-16">
            <div class="lg:col-span-4">
              <h2 id="about-title" class="font-display text-5xl font-black uppercase leading-none tracking-tighter mb-8"></h2>
              <p id="about-text" class="text-zinc-400 leading-relaxed mb-8"></p>
            </div>
            <div id="about-cards" class="lg:col-span-8 grid grid-cols-1 md:grid-cols-2 gap-4"></div>
          </div>
        </div>
      </section>

      <section class="py-32 bg-white text-black">
        <div class="max-w-[1440px] mx-auto px-6">
          <div class="flex flex-col md:flex-row justify-between items-end mb-20 gap-8">
            <h2 id="prices-title" class="font-display text-6xl md:text-7xl font-black uppercase tracking-tighter leading-none"></h2>
            <div class="flex gap-4" id="price-tabs"></div>
          </div>
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            <div id="price-list" class="space-y-4"></div>
            <div class="bg-zinc-100 p-12">
              <h3 class="font-display text-3xl font-black uppercase mb-8 flex items-center gap-4"><iconify-icon icon="lucide:clock" class="text-[#FF3E00]"></iconify-icon>Öffnungszeiten</h3>
              <div id="opening-hours" class="space-y-6"></div>
              <p id="opening-note" class="mt-8 text-sm text-zinc-500 italic"></p>
            </div>
          </div>
        </div>
      </section>

      <section class="py-32 bg-[#FF3E00] text-white overflow-hidden relative">
        <div class="max-w-[1440px] mx-auto px-6 relative z-10">
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-20 items-center">
            <div class="order-2 lg:order-1">
              <h2 id="groups-title" class="font-display text-7xl md:text-8xl font-black uppercase leading-[0.85] tracking-tighter mb-8"></h2>
              <p id="groups-text" class="text-xl mb-12 font-medium opacity-90"></p>
              <div id="group-cards" class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-12"></div>
              <a id="groups-cta" href="#" class="inline-block bg-black text-white px-8 py-4 font-display font-bold uppercase tracking-tighter hover:bg-white hover:text-black transition-all transform hover:-translate-y-0.5"></a>
            </div>
            <div class="order-1 lg:order-2 flex justify-center">
              <div class="relative w-full aspect-square max-w-md">
                <div class="absolute -inset-4 border-2 border-white/30 rotate-3"></div>
                <img id="groups-image" class="w-full h-full object-cover shadow-2xl" alt="Groups" />
              </div>
            </div>
          </div>
        </div>
        <div class="absolute -bottom-20 -right-20 opacity-10 pointer-events-none"><h2 class="font-display text-[20rem] font-black uppercase leading-none select-none">PARTY</h2></div>
      </section>

      <section class="py-32 bg-[#0A0A0A]">
        <div class="max-w-[1440px] mx-auto px-6">
          <div class="grid grid-cols-1 lg:grid-cols-12 gap-20">
            <div class="lg:col-span-7 h-[600px] bg-zinc-900 overflow-hidden relative group">
              <img id="location-map-image" class="w-full h-full object-cover opacity-70 transition-transform duration-700 group-hover:scale-110" alt="Map" />
              <div class="absolute inset-0 flex items-center justify-center">
                <a id="map-link" href="#" class="border-2 border-[#FF3E00] text-[#FF3E00] px-8 py-4 font-display font-bold uppercase tracking-tighter hover:bg-[#FF3E00] hover:text-white transition-all transform hover:-translate-y-0.5">In Google Maps öffnen</a>
              </div>
            </div>
            <div class="lg:col-span-5 flex flex-col justify-center">
              <h2 id="location-title" class="font-display text-5xl font-black uppercase leading-tight tracking-tighter mb-12"></h2>
              <div class="space-y-12">
                <div class="flex items-start space-x-6"><iconify-icon icon="lucide:map-pin" class="text-4xl text-[#FF3E00]"></iconify-icon><div><h4 class="text-xs font-bold uppercase tracking-[0.2em] text-zinc-500 mb-2">Adresse</h4><p id="location-address" class="text-2xl font-bold"></p></div></div>
                <div class="flex items-start space-x-6"><iconify-icon icon="lucide:phone" class="text-4xl text-[#FF3E00]"></iconify-icon><div><h4 class="text-xs font-bold uppercase tracking-[0.2em] text-zinc-500 mb-2">Telefon</h4><p id="location-phone" class="text-2xl font-bold"></p></div></div>
                <div class="flex items-start space-x-6"><iconify-icon icon="lucide:info" class="text-4xl text-[#FF3E00]"></iconify-icon><div><h4 class="text-xs font-bold uppercase tracking-[0.2em] text-zinc-500 mb-2">Anfahrt</h4><p id="location-info" class="text-zinc-400"></p></div></div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="py-32 bg-[#0A0A0A] border-t border-white/5">
        <div class="max-w-[1440px] mx-auto px-6">
          <div class="flex flex-col md:flex-row justify-between items-end mb-16 gap-8">
            <h2 id="events-title" class="font-display text-5xl md:text-7xl font-black uppercase tracking-tighter leading-[0.9] mb-4"></h2>
          </div>
          <div id="events-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>
      </section>

      <section class="py-32 bg-[#0A0A0A] border-t border-white/5">
        <div class="max-w-[1440px] mx-auto px-6">
          <div class="flex flex-col md:flex-row justify-between items-end mb-16 gap-8">
            <div>
              <h2 id="insta-title" class="font-display text-5xl md:text-7xl font-black uppercase tracking-tighter leading-[0.9] mb-4"></h2>
              <a id="insta-handle-link" target="_blank" class="text-xl font-bold text-zinc-500 hover:text-white transition-colors"></a>
            </div>
          </div>
          <div id="insta-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
      </section>
    </main>

    <footer class="bg-black border-t border-white/5 py-24">
      <div class="max-w-[1440px] mx-auto px-6">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-16 mb-20">
          <div class="col-span-1 lg:col-span-1">
            <a id="footer-logo" href="#" class="font-display text-3xl font-black tracking-tighter uppercase block mb-8"></a>
            <p id="footer-text" class="text-zinc-500 text-sm leading-relaxed mb-8"></p>
          </div>
          <div><h4 class="text-xs font-bold uppercase tracking-[0.3em] mb-8 text-[#FF3E00]">Locations</h4><ul id="footer-locations" class="space-y-4 text-sm font-medium"></ul></div>
          <div><h4 class="text-xs font-bold uppercase tracking-[0.3em] mb-8 text-[#FF3E00]">Support</h4><ul id="footer-support" class="space-y-4 text-sm font-medium"></ul></div>
          <div><h4 class="text-xs font-bold uppercase tracking-[0.3em] mb-8 text-[#FF3E00]">CMS</h4><p class="text-xs text-zinc-500 mb-6 uppercase tracking-widest font-bold">Inhalte bearbeiten</p><a href="/admin" class="bg-[#FF3E00] text-white px-4 py-3 font-display font-bold uppercase tracking-tighter hover:bg-white hover:text-black transition-all">Admin öffnen</a></div>
        </div>
        <div class="pt-8 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-6 text-[10px] font-bold uppercase tracking-[0.2em] text-zinc-600">
          <p id="copyright-text"></p>
          <div class="flex space-x-8">
            <a id="footer-imprint-link" class="hover:text-white transition-colors">Impressum</a>
            <a id="footer-privacy-link" class="hover:text-white transition-colors">Datenschutz</a>
            <a id="footer-agb-link" class="hover:text-white transition-colors">AGB</a>
          </div>
        </div>
      </div>
    </footer>
  </div>

  <script src="/app.js"></script>
</body>
</html>
