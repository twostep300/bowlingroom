<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events | Bowlingroom Koblenz</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@800,900&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Satoshi', sans-serif; background: #0a0a0a; color: #fff; margin: 0; }
    .font-display { font-family: 'Cabinet Grotesk', sans-serif; }
    .readable-heading { letter-spacing: 0.02em !important; }
    .event-track { transition: transform .5s ease; }
  </style>
</head>
<body>
  <div class="min-h-screen bg-[#0A0A0A] selection:bg-[#FF3E00] selection:text-white">
    <nav class="fixed top-0 left-0 right-0 z-50 bg-[#0A0A0A]/90 backdrop-blur-md border-b border-white/10">
      <div class="max-w-[1440px] mx-auto px-6 h-20 flex items-center justify-between">
        <a href="/locations/koblenz" class="flex items-center">
          <img id="logo-image" alt="Bowlingroom" class="h-[45px] w-auto" />
        </a>
        <div class="hidden md:flex items-center gap-6">
          <div class="flex items-center space-x-12" id="nav-links"></div>
          <span id="nav-open-status" class="inline-flex items-center gap-2 bg-white/5 border border-white/10 px-3 py-2 rounded-full text-[11px] font-bold uppercase tracking-[0.12em]"></span>
        </div>
        <a id="nav-cta" href="#" class="bg-[#FF3E00] text-white px-6 py-2 font-display font-bold uppercase tracking-tighter hover:bg-white hover:text-black transition-all">Jetzt Buchen</a>
      </div>
    </nav>

    <main class="pt-28 pb-24">
      <section class="max-w-[1440px] mx-auto px-6 mb-16">
        <div class="flex items-center gap-3 text-[#FF3E00] mb-5 text-xs font-bold uppercase tracking-[0.3em]">
          <iconify-icon icon="lucide:calendar-heart"></iconify-icon>
          <span>Events</span>
        </div>
        <h1 id="events-main-title" class="readable-heading font-display text-6xl md:text-8xl font-black uppercase leading-[0.9]"></h1>
        <p id="events-main-subtitle" class="mt-6 text-zinc-300 max-w-3xl"></p>
      </section>

      <section id="events-highlights-section" class="max-w-[1440px] mx-auto px-6 mb-16">
        <h2 id="events-highlights-heading" class="font-display text-4xl md:text-5xl font-black uppercase mb-8"></h2>
        <div class="overflow-hidden border border-white/10 bg-zinc-950">
          <div id="events-highlight-track" class="event-track flex"></div>
        </div>
        <div class="mt-5 flex items-center justify-between">
          <div id="events-highlight-dots" class="flex gap-2"></div>
          <div class="flex gap-2">
            <button id="events-highlight-prev" class="w-10 h-10 border border-white/20 hover:border-[#FF3E00] hover:text-[#FF3E00]">‹</button>
            <button id="events-highlight-next" class="w-10 h-10 border border-white/20 hover:border-[#FF3E00] hover:text-[#FF3E00]">›</button>
          </div>
        </div>
      </section>

      <section id="events-weekly-section" class="max-w-[1440px] mx-auto px-6 mb-16">
        <h2 id="events-weekly-heading" class="font-display text-4xl md:text-5xl font-black uppercase mb-8"></h2>
        <div id="events-weekly-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-5 gap-5"></div>
      </section>

      <section id="events-upcoming-section" class="max-w-[1440px] mx-auto px-6">
        <h2 id="events-upcoming-heading" class="font-display text-4xl md:text-5xl font-black uppercase mb-8"></h2>
        <div id="events-upcoming-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        <div class="mt-8 flex justify-center">
          <button id="events-upcoming-more" class="border border-white/20 px-6 py-3 font-display font-bold uppercase tracking-[0.1em] hover:border-[#FF3E00] hover:text-[#FF3E00] transition-colors">Mehr Sonder-Events</button>
        </div>
      </section>
    </main>

    <footer class="bg-black border-t border-white/5 py-16 mt-16">
      <div class="max-w-[1440px] mx-auto px-6">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-10 mb-12">
          <div><a id="footer-logo" href="/locations/koblenz" class="font-display text-3xl font-black tracking-tighter uppercase block mb-5"></a><p id="footer-text" class="text-zinc-500 text-sm leading-relaxed"></p></div>
          <div><h4 class="text-xs font-bold uppercase tracking-[0.3em] mb-6 text-[#FF3E00]">Locations</h4><ul id="footer-locations" class="space-y-3 text-sm font-medium"></ul></div>
          <div><h4 class="text-xs font-bold uppercase tracking-[0.3em] mb-6 text-[#FF3E00]">Support</h4><ul id="footer-support" class="space-y-3 text-sm font-medium"></ul></div>
          <div><a href="/admin" class="inline-block bg-[#FF3E00] text-white px-4 py-3 font-display font-bold uppercase tracking-tighter hover:bg-white hover:text-black transition-all">Admin öffnen</a></div>
        </div>
        <div class="pt-6 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-5 text-[10px] font-bold uppercase tracking-[0.2em] text-zinc-600">
          <p id="copyright-text"></p>
          <div class="flex space-x-8">
            <a id="footer-imprint-link" class="hover:text-white transition-colors">Impressum</a>
            <a id="footer-privacy-link" class="hover:text-white transition-colors">Datenschutz</a>
            <a id="footer-agb-link" class="hover:text-white transition-colors">AGB</a>
          </div>
        </div>
      </div>
    </footer>
  </div>

  <script src="/locations/koblenz/events/page.js"></script>
</body>
</html>
