version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: bowlingroom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bowlingroom
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - bowlingroom_postgres_data:/var/lib/postgresql/data

volumes:
  bowlingroom_postgres_data:
